{% extends "base.html" %}

{% block title %}Login - CreditValet{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card">
        <div class="auth-header">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to query credit scoring models</p>
        </div>
        
        <form action="{{ url_for('auth.login') }}" method="POST" id="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <p>New to CreditValet? <a href="{{ url_for('auth.register') }}" class="auth-link">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
