{% extends "base.html" %}

{% block title %}Register - CreditValet{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card">
        <div class="auth-header">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the CreditValet scoring platform</p>
        </div>
        
        <form action="{{ url_for('auth.register') }}" method="POST" id="register-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="yourname@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create a strong password" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Register</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
